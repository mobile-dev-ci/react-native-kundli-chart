version: 2
updates:
  # Library dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development

  # Example app dependencies
  - package-ecosystem: npm
    directory: "/example"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions used by CI
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
