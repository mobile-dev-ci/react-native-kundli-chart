name: Release

# Publishes to npm when a version tag (e.g. v1.2.3) is pushed.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required — and
# attaches build provenance. One-time setup on npmjs.com: add this repo +
# workflow (release.yml) as a Trusted Publisher for the package.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC token for Trusted Publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Trusted Publishing (OIDC) requires npm >= 11.5.1 (npm@latest needs Node >= 22).
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Check if version is already on npm
        id: published
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VER="$(node -p "require('./package.json').version")"
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VER already published — skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # prepublishOnly (typecheck, lint, test, build) runs as the publish gate.
      - name: Publish to npm
        if: steps.published.outputs.exists == 'false'
        run: npm publish --provenance --access public

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Print the body under "## [VER]" up to the next "## [" heading or the
          # link-reference definitions at the bottom of the file.
          awk -v ver="$VER" '
            /^## \[/ {
              if (inSection) exit
              if (index($0, "## [" ver "]") == 1) { inSection = 1; next }
            }
            inSection && /^\[[^]]+\]: / { exit }
            inSection { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # trim leading blank lines
          sed -i -e '/./,$!d' RELEASE_NOTES.md
          if [ -s RELEASE_NOTES.md ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false (no ## [$VER] section) — will fall back to auto-notes"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_ARGS="--generate-notes"
          if [ "${{ steps.notes.outputs.found }}" = "true" ]; then
            NOTES_ARGS="--notes-file RELEASE_NOTES.md"
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            if [ "${{ steps.notes.outputs.found }}" = "true" ]; then
              gh release edit "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
            else
              echo "Release exists and no CHANGELOG section — leaving notes unchanged"
            fi
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" $NOTES_ARGS --verify-tag
          fi
